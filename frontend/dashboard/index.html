<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoProxy Genesis Console</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
      background-color: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: grid;
      grid-template-columns: 300px 1fr 350px;
      grid-template-rows: 60px 1fr 200px;
      height: 100vh;
      gap: 1px;
      background-color: #1a1a1a;
    }

    /* Top Bar */
    .top-bar {
      grid-column: 1 / -1;
      background-color: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid #1a1a1a;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      color: #00ffff;
      letter-spacing: 2px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #00ff00;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Left Panel - Modules */
    .left-panel {
      background-color: #0d0d0d;
      padding: 15px;
      overflow-y: auto;
      border-right: 1px solid #1a1a1a;
    }

    .panel-title {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
    }

    .module-item {
      padding: 10px;
      margin-bottom: 8px;
      background-color: #111;
      border-left: 2px solid #333;
      cursor: pointer;
      transition: all 0.2s;
    }

    .module-item:hover {
      background-color: #161616;
      border-left-color: #00ffff;
    }

    .module-item.active {
      background-color: #161616;
      border-left-color: #00ffff;
    }

    .module-name {
      font-size: 13px;
      margin-bottom: 4px;
    }

    .module-status {
      font-size: 10px;
      color: #666;
    }

    .status-running { color: #00ff00; }
    .status-stopped { color: #ff4444; }
    .status-warning { color: #ffaa00; }
    .status-offline { color: #666; }

    /* Center - Runtime Graph */
    .center-panel {
      background-color: #0a0a0a;
      position: relative;
      overflow: hidden;
    }

    .graph-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .node {
      position: absolute;
      padding: 12px 20px;
      background-color: #111;
      border: 1px solid #333;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .node:hover {
      border-color: #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
    }

    .node.selected {
      border-color: #00ffff;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
    }

    .node-genesys { 
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      border-color: #00ffff;
    }

    .node-ai { 
      top: 150px;
      left: 30%;
    }

    .node-memory { 
      top: 150px;
      left: 50%;
      transform: translateX(-50%);
    }

    .node-storage { 
      top: 150px;
      right: 30%;
    }

    .node-dashboard { 
      top: 250px;
      left: 50%;
      transform: translateX(-50%);
    }

    .connection {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, #333, #00ffff, #333);
      transform-origin: left center;
      animation: flow 2s linear infinite;
    }

    @keyframes flow {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }

    /* Right Panel - Inspector */
    .right-panel {
      background-color: #0d0d0d;
      padding: 15px;
      overflow-y: auto;
      border-left: 1px solid #1a1a1a;
    }

    .inspector-section {
      margin-bottom: 20px;
    }

    .inspector-label {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .inspector-value {
      font-size: 13px;
      padding: 8px;
      background-color: #111;
      border-radius: 3px;
      word-break: break-all;
    }

    .capability-tag {
      display: inline-block;
      padding: 4px 8px;
      background-color: #1a1a1a;
      border: 1px solid #333;
      border-radius: 3px;
      font-size: 10px;
      margin: 2px;
      color: #00ffff;
    }

    /* Bottom Left - Event Stream */
    .bottom-left {
      background-color: #0d0d0d;
      padding: 15px;
      overflow: hidden;
      border-top: 1px solid #1a1a1a;
      border-right: 1px solid #1a1a1a;
    }

    .event-list {
      height: calc(100% - 30px);
      overflow-y: auto;
      font-size: 11px;
    }

    .event-item {
      padding: 4px 0;
      border-bottom: 1px solid #1a1a1a;
      font-family: monospace;
    }

    .event-time {
      color: #666;
      margin-right: 8px;
    }

    .event-type {
      color: #00ffff;
    }

    /* Bottom Center - Console */
    .bottom-center {
      background-color: #0a0a0a;
      padding: 15px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
    }

    .console-output {
      flex: 1;
      overflow-y: auto;
      font-size: 11px;
      font-family: monospace;
      color: #888;
      margin-bottom: 10px;
    }

    .console-input-line {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .prompt {
      color: #00ffff;
      font-weight: bold;
    }

    .console-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #e0e0e0;
      font-family: monospace;
      font-size: 12px;
      outline: none;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="logo">GENESIS CONSOLE</div>
      <div class="status-indicator">
        <div class="status-dot"></div>
        <span style="font-size: 12px; color: #00ff00;">RUNNING</span>
      </div>
    </div>

    <!-- Left Panel - Modules -->
    <div class="left-panel">
      <div class="panel-title">Module Registry</div>
      <div id="modules-list"></div>
    </div>

    <!-- Center - Runtime Graph -->
    <div class="center-panel">
      <div class="graph-container" id="graph"></div>
    </div>

    <!-- Right Panel - Inspector -->
    <div class="right-panel">
      <div class="panel-title">Inspector</div>
      <div id="inspector">
        <div style="color: #666; font-size: 12px; text-align: center; margin-top: 50px;">
          Select a node to inspect
        </div>
      </div>
    </div>

    <!-- Bottom Left - Event Stream -->
    <div class="bottom-left">
      <div class="panel-title">Event Stream</div>
      <div class="event-list" id="event-stream"></div>
    </div>

    <!-- Bottom Center - Console -->
    <div class="bottom-center">
      <div class="console-output" id="console-output"></div>
      <div class="console-input-line">
        <span class="prompt">></span>
        <input type="text" class="console-input" id="console-input" placeholder="Type command... (help)" autofocus>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
